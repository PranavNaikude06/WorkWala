<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container shadow-md docked full-width top-0 sticky z-50">

<div class="flex items-center gap-4">
<button aria-label="Back" class="p-2 hover:bg-primary-fixed-variant/10 transition-transform active:scale-95">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-on-primary dark:text-on-primary-container">Post a Job</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-on-primary/20">
<img class="w-full h-full object-cover" data-alt="A clean, professional headshot of a foreman wearing a bright safety vest and a friendly expression, set against a blurred construction background. The lighting is warm and natural, reflecting the reliable and bold personality of the WorkWala brand. High-quality digital photography with sharp focus on the face." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxQxxVpeztR53aftfwupo5tHQUDk5ZIFlRiAogPdHzwTwZsCqsdjLZE8jFIqnXpuShnBrK8OIfIBi4kezV62YoVt62pN2TjqlnTlI10l_ZSYmTrTZ1BZTiq986WSP1N8AUrl3_6I-u-JoQ4e0YjyRd3lZSXwT1o6-pR4IEWms-mRAChLLumSxId_vCMThnpnfr5oMatsqS4UYvr0G0muf1mKumg01rSvX8xSK0S3Lck-E37Njzmnxu2Q"/>
</div>
</div>
</header>
<main class="px-margin-mobile pt-8 max-w-2xl mx-auto">
<!-- Step Indicator -->
<div class="mb-stack-sm flex items-center justify-between">
<span class="text-label-sm font-label-sm text-on-surface-variant/80 tracking-wider">STEP 1 OF 3</span>
<div class="flex gap-1">
<div class="w-8 h-1.5 rounded-full bg-primary-container"></div>
<div class="w-8 h-1.5 rounded-full bg-surface-variant"></div>
<div class="w-8 h-1.5 rounded-full bg-surface-variant"></div>
</div>
</div>
<!-- Headline -->
<h2 class="text-headline-lg-mobile font-headline-lg-mobile mb-stack-md text-on-surface leading-tight">
            What type of work do you need?
        </h2>
<!-- Category Grid -->
<div class="grid grid-cols-2 gap-4" id="categoryGrid">
<!-- Category Item 1 -->
<button class="category-card flex flex-col items-center justify-center bg-surface border-2 border-outline-variant/30 rounded-[24px] p-6 h-[160px] shadow-[0_4px_12px_rgba(0,0,0,0.06)] transition-all duration-200 active:scale-95 group" onclick="toggleCategory(this)">
<div class="w-16 h-16 rounded-full bg-primary-fixed/30 flex items-center justify-center mb-3 group-hover:bg-primary-fixed/50 transition-colors">
<span class="material-symbols-outlined text-[32px] text-primary" data-icon="engineering">engineering</span>
</div>
<span class="text-label-lg font-label-lg text-on-surface">Laborer</span>
</button>
<!-- Category Item 2 -->
<button class="category-card flex flex-col items-center justify-center bg-surface border-2 border-outline-variant/30 rounded-[24px] p-6 h-[160px] shadow-[0_4px_12px_rgba(0,0,0,0.06)] transition-all duration-200 active:scale-95 group" onclick="toggleCategory(this)">
<div class="w-16 h-16 rounded-full bg-primary-fixed/30 flex items-center justify-center mb-3 group-hover:bg-primary-fixed/50 transition-colors">
<span class="material-symbols-outlined text-[32px] text-primary" data-icon="construction">construction</span>
</div>
<span class="text-label-lg font-label-lg text-on-surface">Mason</span>
</button>
<!-- Category Item 3 -->
<button class="category-card flex flex-col items-center justify-center bg-surface border-2 border-outline-variant/30 rounded-[24px] p-6 h-[160px] shadow-[0_4px_12px_rgba(0,0,0,0.06)] transition-all duration-200 active:scale-95 group" onclick="toggleCategory(this)">
<div class="w-16 h-16 rounded-full bg-primary-fixed/30 flex items-center justify-center mb-3 group-hover:bg-primary-fixed/50 transition-colors">
<span class="material-symbols-outlined text-[32px] text-primary" data-icon="carpenter">carpenter</span>
</div>
<span class="text-label-lg font-label-lg text-on-surface">Carpenter</span>
</button>

<span class="text-label-lg font-label-lg text-on-surface">Plumber</span>
</button>

<span class="material-symbols-outlined text-tertiary">info</span>
<div>

<p class="text-body-md font-body-md text-on-surface-variant">Don't worry, you can add more details or change this later in the description.</p>
</div>

<div class="max-w-2xl mx-auto">
<button class="w-full h-touch-target-min bg-surface-variant text-on-surface-variant font-bold text-lg rounded-full shadow-none cursor-not-allowed transition-all duration-200 uppercase tracking-wide" disabled="" id="nextButton">
                Next Step
            </button>
</div>
</div>
<!-- Navigation Shadow Element (Placeholder from JSON shell layout but suppressed for transactional) -->
<!-- Suppressed: Shell Visibility & Relevance Filter applied for Task-Focused "Post a Job" flow -->
<script>
        function toggleCategory(element) {
            // Unselect all others
            const cards = document.querySelectorAll('.category-card');
            cards.forEach(card => card.classList.remove('category-card-active'));
            
            // Toggle current
            element.classList.add('category-card-active');
            
            // Enable next button
            const nextBtn = document.getElementById('nextButton');
            nextBtn.disabled = false;
            nextBtn.classList.remove('bg-surface-variant', 'text-on-surface-variant', 'cursor-not-allowed');
            nextBtn.classList.add('bg-primary-container', 'text-on-primary', 'shadow-lg', 'active:scale-[0.97]');
            
            // Trigger haptic-like vibration if supported
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }
    </script>

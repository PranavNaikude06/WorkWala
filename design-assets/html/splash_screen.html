<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafaf5;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom animation for the logo icon */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .gradient-bg {
            background: linear-gradient(180deg, #FF6B00 0%, #E05A00 100%);
        }
        .active-press:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<!-- Mobile Splash Screen Container (375x812) -->
<main class="relative w-[375px] h-[812px] gradient-bg flex flex-col justify-between items-center px-margin-mobile py-16 shadow-2xl overflow-hidden rounded-[40px]">
<!-- Background Atmospheric Element -->
<div class="absolute inset-0 pointer-events-none opacity-10">
<div class="absolute -top-24 -left-24 w-64 h-64 bg-white rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-32 w-80 h-80 bg-on-primary-container rounded-full blur-[100px]"></div>
</div>
<!-- Spacer for top centering -->
<div></div>
<!-- Center Content: Logo & Wordmark -->
<div class="flex flex-col items-center gap-stack-sm text-center z-10">
<div class="flex items-center justify-center relative">
<!-- Hardhat Icon Integrated with W concept -->
<div class="flex items-baseline gap-1">
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-[64px] text-on-primary animate-float mb-[-12px]" style="font-variation-settings: 'FILL' 1;">engineering</span>
<span class="text-on-primary font-headline-lg font-extrabold tracking-tighter text-[48px] leading-none">W</span>
</div>
<span class="text-on-primary font-headline-lg font-extrabold tracking-tighter text-[48px] leading-none -ml-1">orkWala</span>
</div>
</div>
<p class="text-on-primary text-label-lg font-label-lg mt-stack-sm tracking-wide opacity-90">
                Work For Everyone. Jobs For Everyone.
            </p>
</div>
<!-- Bottom Actions -->
<div class="w-full flex flex-col items-center gap-stack-md z-10">
<!-- Get Started Button -->
<button class="w-full h-touch-target-min bg-on-primary text-primary-container font-bold text-body-lg rounded-full shadow-lg active-press transition-all duration-150 uppercase tracking-wider flex items-center justify-center">
                Get Started
            </button>
<!-- Login Link -->
<a class="text-on-primary font-label-lg text-label-lg hover:underline transition-all active-press" href="#">
                Already have an account? <span class="font-bold">Log in</span>
</a>
<!-- Bottom Indicator Handle (iOS style) -->
<div class="w-32 h-1.5 bg-on-primary/30 rounded-full mt-stack-md"></div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.querySelector('button');
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('touchstart', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('touchend', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
</body></html>

<script>
        function toggleOTPView() {
            const phoneContainer = document.getElementById('phone-container');
            const otpContainer = document.getElementById('otp-container');

            phoneContainer.classList.add('opacity-0', '-translate-y-4');
            setTimeout(() => {
                phoneContainer.classList.add('hidden');
                otpContainer.classList.remove('hidden');
                setTimeout(() => {
                    otpContainer.classList.remove('opacity-0', 'translate-y-4');
                    otpContainer.classList.add('opacity-100', 'translate-y-0');
                    // Focus first OTP input
                    document.querySelector('.otp-input').focus();
                }, 50);
            }, 300);
        }

        function resetView() {
            const phoneContainer = document.getElementById('phone-container');
            const otpContainer = document.getElementById('otp-container');

            otpContainer.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                otpContainer.classList.add('hidden');
                phoneContainer.classList.remove('hidden');
                setTimeout(() => {
                    phoneContainer.classList.remove('opacity-0', '-translate-y-4');
                    phoneContainer.classList.add('opacity-100', 'translate-y-0');
                }, 50);
            }, 300);
        }

        // Auto-focus logic for OTP inputs
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>

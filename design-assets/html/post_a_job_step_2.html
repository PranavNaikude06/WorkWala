<style>
        body { font-family: 'Inter', sans-serif; background-color: #fafaf5; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-pill { transition: transform 0.1s ease; }
        .active-pill:active { transform: scale(0.95); }
        .glass-header { backdrop-filter: blur(8px); }
    </style>

<body class="text-on-surface antialiased pb-32">
<!-- Top AppBar (from JSON guidance) -->
<header class="bg-primary-container text-on-primary-container docked full-width top-0 z-50 shadow-md flex justify-between items-center w-full px-margin-mobile h-[64px] sticky">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[24px] hover:bg-primary-fixed-variant/10 p-2 rounded-full transition-all">arrow_back</button>
<h1 class="text-headline-md font-headline-md font-bold text-on-primary">WorkWala</h1>
</div>
<div class="w-10 h-10 rounded-full border-2 border-on-primary/30 bg-cover bg-center" data-alt="A professional close-up portrait of a South Asian construction foreman in a clean white shirt, smiling confidently against a soft-focus urban construction site background. The lighting is warm and natural, suggesting a reliable and hardworking personality. The style is high-end digital photography with vibrant colors and sharp details." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAHfwADoY9uE6jVlBe-no45X4V4Ox6spY5MlEG6x_aVCdJ0PF0csWnYOZrmQEnw_pbdL3Js_wL7gLTC9T8sxfnmhdq3HZkWuMUgnZzhM2ytlLVU7NpESLD5s6ao5tRjKvd06hWEUnOI5AfmOKNp4DAJ70ATuH6LNBHEtQCEHOHntu5226cYfyWP8n99kE5NPxLoj1fJFftpFmRAkRPQr27-vAJvcYTT8XPl8DIM00T5oc6xoowHilClKA')"></div>
</header>
<main class="max-w-md mx-auto px-margin-mobile mt-stack-md">
<!-- Progress & Category -->
<div class="flex flex-col gap-stack-sm mb-stack-md">
<div class="flex justify-between items-end">
<div>
<span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider">Post a Job</span>
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-primary">Step 2 of 3</h2>
</div>
<div class="px-4 py-2 bg-surface-container-highest rounded-full flex items-center gap-2 border border-outline-variant/30">
<span class="text-lg">🧱</span>
<span class="text-label-lg font-label-lg text-on-surface-variant">Mason</span>
</div>
</div>
<!-- Progress Bar -->
<div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
<div class="bg-primary-container h-full w-[66%] transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Form Card -->
<div class="bg-white rounded-[24px] p-5 shadow-[0_4px_12px_rgba(0,0,0,0.12)] flex flex-col gap-6">
<!-- Description -->
<div class="flex flex-col gap-2">
<label class="text-label-lg font-label-lg text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">description</span>
                    Job Description
                </label>
<textarea class="w-full h-32 p-4 rounded-xl border-2 border-[#E5E7EB] focus:border-[#FF6B00] focus:ring-0 text-body-md font-body-md transition-colors resize-none" placeholder="Describe the work (e.g., Wall construction, plastering, cement mixing...)"></textarea>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Workers Needed Stepper -->
<div class="flex flex-col gap-2">
<label class="text-label-lg font-label-lg text-on-surface">Workers</label>
<div class="flex items-center justify-between h-[56px] border-2 border-[#E5E7EB] rounded-xl px-2">
<button class="w-10 h-10 flex items-center justify-center bg-surface-container rounded-lg text-primary active:scale-90 transition-transform" onclick="decrement('workers')">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-headline-md font-headline-md text-on-surface" id="workers-count">1</span>
<button class="w-10 h-10 flex items-center justify-center bg-surface-container rounded-lg text-primary active:scale-90 transition-transform" onclick="increment('workers')">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Pay Input -->
<div class="flex flex-col gap-2">
<label class="text-label-lg font-label-lg text-on-surface">Pay per day</label>
<div class="relative h-[56px]">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-headline-md font-bold text-on-surface-variant">₹</span>
<input class="w-full h-full pl-10 pr-4 rounded-xl border-2 border-[#E5E7EB] focus:border-[#FF6B00] focus:ring-0 text-headline-md font-headline-md" placeholder="800" type="number"/>
</div>
</div>
</div>
<!-- Timings -->
<div class="flex flex-col gap-2">
<label class="text-label-lg font-label-lg text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">schedule</span>
                    Work Timings
                </label>
<div class="flex items-center gap-3">
<div class="flex-1 flex flex-col">
<span class="text-[10px] uppercase text-on-surface-variant ml-1">Start</span>
<input class="h-[56px] border-2 border-[#E5E7EB] rounded-xl px-4 focus:border-[#FF6B00] focus:ring-0 font-medium" type="time" value="09:00"/>
</div>
<div class="text-on-surface-variant mt-4">to</div>
<div class="flex-1 flex flex-col">
<span class="text-[10px] uppercase text-on-surface-variant ml-1">End</span>
<input class="h-[56px] border-2 border-[#E5E7EB] rounded-xl px-4 focus:border-[#FF6B00] focus:ring-0 font-medium" type="time" value="18:00"/>
</div>
</div>
</div>
<!-- Location -->
<div class="flex flex-col gap-2">
<label class="text-label-lg font-label-lg text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">location_on</span>
                    Work Location
                </label>
<div class="relative">
<input class="w-full h-[56px] pl-4 pr-12 rounded-xl border-2 border-[#E5E7EB] focus:border-[#FF6B00] focus:ring-0 text-body-md" placeholder="Enter area or landmark" type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-primary hover:bg-primary-container/10 rounded-full transition-all">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<button class="flex items-center gap-2 text-primary text-label-lg font-semibold mt-1 px-1 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl">near_me</span>
                    Use my current location
                </button>
</div>
</div>
<!-- Tip Card -->
<div class="mt-stack-md bg-secondary-container/30 border border-secondary-container p-4 rounded-2xl flex gap-3">
<span class="material-symbols-outlined text-secondary">info</span>
<p class="text-label-sm font-label-sm text-secondary-container-on">Pro Tip: Masons usually expect lunch breaks and water at the site. Mentioning these will attract better workers.</p>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-white px-margin-mobile py-4 shadow-[0_-8px_24px_rgba(0,0,0,0.08)] z-40 flex flex-col gap-3">
<button class="w-full h-[56px] bg-[#FF6B00] hover:bg-[#e66000] text-white text-body-lg font-bold rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            Review &amp; Post
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Navigation Shell (Suppressed as per rules for transactional page, but including script for stepper logic) -->
<script>
        function increment(id) {
            const el = document.getElementById(id + '-count');
            let val = parseInt(el.innerText);
            el.innerText = val + 1;
        }

        function decrement(id) {
            const el = document.getElementById(id + '-count');
            let val = parseInt(el.innerText);
            if (val > 1) {
                el.innerText = val - 1;
            }
        }

        // Simple haptic feedback simulation
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });
    </script>
</body></html>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        body {

            -webkit-tap-highlight-color: transparent;

<body class="font-body-md text-on-background min-h-screen pb-24">
<!-- Top AppBar Strategy -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-[64px] bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container shadow-md">
<h1 class="text-headline-md font-headline-md font-bold text-on-primary dark:text-on-primary-container">WorkWala</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary-fixed-variant/10 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="mt-[64px]">
<!-- Hero Section: Orange Gradient -->
<section class="relative w-full h-[220px] bg-gradient-to-br from-primary-container to-primary flex flex-col items-center justify-end pb-8">
<!-- Animated Shader Background (Atmospheric touch) -->

<div class="relative z-10 flex flex-col items-center">
<!-- Large Avatar -->
<div class="w-24 h-24 rounded-full border-4 border-on-primary shadow-lg overflow-hidden bg-surface mb-3">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a friendly Indian man in his late 30s, Raj Sharma, wearing a clean white polo shirt. The lighting is warm and natural, suggesting an outdoor daylight setting in a modern urban environment. The photography style is high-resolution, sharp, and trustworthy, with a soft-focus background of greenery." src="https://lh3.googleusercontent.com/aida-public/AB6AXuApdn7ppRzPHX4u_WaOi_KTCp94jpN_adIoKvu53EYoURqivq-ZCxCrwIj8OsVp-4miy2KJ-YuS0pZyGG7ZTaanxw2eK4FUXVSv0pQgr59Odqf16y2Cf1ewt_NWU5dERA_ay-kEVN5gkfSy5z1I2O6VuhR5xUfazYyzwsXwtJ1v65wwxiMfxH9WO9x1fLZFBK0iE9l_I9PjRaGhbdEEQyIKhCsZnwi3h8N5rpezSxQVtxP-uZgzeeS2pg"/>
</div>
<h2 class="text-on-primary font-headline-lg-mobile text-headline-lg-mobile">Raj Sharma</h2>
<div class="flex items-center gap-2 mt-1">
<span class="flex items-center text-on-primary/90 text-label-lg font-label-lg">
<span class="material-symbols-outlined text-[18px] mr-1">location_on</span>
                        Koramangala
                    </span>
<span class="px-3 py-0.5 bg-tertiary-container text-on-tertiary-container rounded-full text-label-sm font-label-sm shadow-sm">
                        Job Poster
                    </span>
</div>
</div>
</section>
<!-- Stats Row Card -->
<section class="px-margin-mobile -mt-6 relative z-20">
<div class="bg-surface-container-lowest rounded-[24px] shadow-elevation-1 p-5 flex justify-between items-center text-center">
<div class="flex-1 border-r border-outline-variant/30">
<p class="text-primary font-bold text-[18px]">12</p>
<p class="text-on-surface-variant text-label-sm font-label-sm">Jobs Posted</p>
</div>
<div class="flex-1 border-r border-outline-variant/30">
<p class="text-primary font-bold text-[18px] flex items-center justify-center gap-1">
                        4.8 <span class="material-symbols-outlined text-[16px] text-tertiary-container" style="font-variation-settings: 'FILL' 1;">star</span>
</p>
<p class="text-on-surface-variant text-label-sm font-label-sm">Rating</p>
</div>
<div class="flex-1">
<p class="text-primary font-bold text-[18px]">45</p>
<p class="text-on-surface-variant text-label-sm font-label-sm">Workers Hired</p>
</div>
</div>
</section>
<!-- Menu List Section -->
<section class="mt-stack-md px-margin-mobile flex flex-col gap-4">
<h3 class="text-on-surface-variant font-label-lg text-label-lg ml-1">Account Settings</h3>
<div class="bg-surface rounded-[24px] overflow-hidden border border-outline-variant/20">
<!-- Menu Item 1 -->
<button class="w-full h-touch-target-min flex items-center px-5 py-4 gap-4 hover:bg-surface-variant/50 transition-colors border-b border-outline-variant/20 text-left">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined">edit</span>
</div>
<span class="flex-1 text-on-surface font-label-lg text-label-lg">Edit Profile</span>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Menu Item 2 -->
<button class="w-full h-touch-target-min flex items-center px-5 py-4 gap-4 hover:bg-surface-variant/50 transition-colors border-b border-outline-variant/20 text-left">
<div class="w-10 h-10 rounded-full bg-secondary-fixed flex items-center justify-center text-secondary">
<span class="material-symbols-outlined">sync_alt</span>
</div>
<span class="flex-1 text-on-surface font-label-lg text-label-lg">Switch to Worker</span>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Menu Item 3 -->

<span class="material-symbols-outlined">work</span>
</div>
<span class="flex-1 text-on-surface font-label-lg text-label-lg">My Jobs</span>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Menu Item 4 -->
<button class="w-full h-touch-target-min flex items-center px-5 py-4 gap-4 hover:bg-surface-variant/50 transition-colors border-b border-outline-variant/20 text-left">
<div class="w-10 h-10 rounded-full bg-secondary-fixed flex items-center justify-center text-secondary">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<span class="flex-1 text-on-surface font-label-lg text-label-lg">Payments &amp; Wallet</span>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Menu Item 5 -->
<button class="w-full h-touch-target-min flex items-center px-5 py-4 gap-4 hover:bg-surface-variant/50 transition-colors text-left">
<div class="w-10 h-10 rounded-full bg-error-container flex items-center justify-center text-error">
<span class="material-symbols-outlined">logout</span>
</div>
<span class="flex-1 text-error font-label-lg text-label-lg">Log Out</span>
<span class="material-symbols-outlined text-error/40">chevron_right</span>
</button>
</div>
</section>
<!-- Help Section (Asymmetric extra element) -->
<section class="mt-stack-md px-margin-mobile mb-8">
<div class="bg-primary-fixed-dim/30 rounded-[24px] p-6 flex items-center gap-4 border-2 border-dashed border-primary/20">
<div class="flex-1">
<h4 class="text-on-primary-fixed font-bold text-label-lg">Need help?</h4>
<p class="text-on-primary-fixed-variant text-label-sm mt-1">Talk to our support team for job-related queries.</p>
<button class="mt-4 px-6 h-10 bg-primary text-on-primary rounded-full font-bold text-label-sm active:scale-95 transition-transform">
                        Chat Now

<div class="w-20 h-20 opacity-40">
<span class="material-symbols-outlined text-[80px] text-primary">support_agent</span>
</div>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-[72px] pb-safe bg-surface dark:bg-surface-container-highest border-t border-outline-variant/30 shadow-[0_-4px_12px_rgba(0,0,0,0.12)] rounded-t-xl">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim hover:bg-surface-variant/50 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-label-sm font-label-sm">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim hover:bg-surface-variant/50 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="work">work</span>
<span class="text-label-sm font-label-sm">Jobs</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim hover:bg-surface-variant/50 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="text-label-sm font-label-sm">Post</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim hover:bg-surface-variant/50 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="chat">chat</span>
<span class="text-label-sm font-label-sm">Messages</span>
</button>
<!-- ACTIVE TAB: Profile -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed bg-primary-container/20 rounded-full px-4 py-1 scale-90 transition-all duration-200">
<span class="material-symbols-outlined active-nav-icon" data-icon="person">person</span>
<span class="text-label-sm font-label-sm">Profile</span>
</button>
</nav>
<script>
        // Micro-interaction for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });

        // Simple scroll parallax effect for the hero
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const hero = document.querySelector('section.bg-gradient-to-br');
            if (hero) {
                hero.style.backgroundPositionY = (scrolled * 0.5) + 'px';
            }
        });
    </script>
</body></html>
